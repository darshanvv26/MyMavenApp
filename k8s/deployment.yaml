apiVersion: apps/v1
kind: Deployment

metadata:
  name: mymavenapp-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: mymavenapp

  template:
    metadata:
      labels:
        app: mymavenapp

    spec:
      containers:
      - name: mymavenapp

        image: darshanvv26/mymavenapp:latest

        ports:
        - containerPort: 8080
